      window.addEventListener('error', function(e) {

        el.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:20px;word-break:break-word;';
        el.innerText = 'JS Error: ' + (e.message || e.error);
        if(document.body) document.body.appendChild(el);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:orange;color:white;z-index:9999;padding:20px;word-break:break-word;';
        el.innerText = 'Promise Rejection: ' + (e.reason ? e.reason.message || e.reason : 'Unknown');
        if(document.body) document.body.appendChild(el);
      });
    </script>
