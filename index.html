  <script>
    // ── Auto-update for iOS Safari (and all browsers) ──────────
    // Increment APP_VERSION with every deploy to force a fresh load.
    const APP_VERSION = '136';
    
    // 1. A recursive function to unregister all SWs and empty all CacheStorage
    async function clearAndReload() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      // 2. Delete every cache entry
      if ('caches' in window) {
        const CACHE_NAME = 'lifemaxx-cache-v136';
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      // 3. Save new version so we don't loop
      localStorage.setItem('lm_app_version', APP_VERSION);
      // 4. Hard reload (bypasses browser cache)
      window.location.reload(true);
    }

    const storedVersion = localStorage.getItem('lm_app_version');
    if (storedVersion !== APP_VERSION) {
      // New version detected — clear everything then reload
      clearAndReload();
    } else {
      // Same version — just register the SW normally
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('[SW] Registered, scope:', reg.scope);
          }).catch(err => console.log('[SW] Registration failed:', err));
        });
      }
    }
  </script>
